# Enhanced Nginx configuration for Laravel Octane with FrankenPHP

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

# Upstream for load balancing (if using multiple FrankenPHP instances)
upstream frankenphp_backend {
    server highbase-app:8000;
}

# Upstream for WebSocket app
upstream websocket_backend {
    server highbase-app:8081;
    keepalive 32;
}

upstream typesense_server {
    server typesense:8108;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
     listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qa.highbasemarket.com www.qa.highbasemarket.com;

    ssl_certificate /etc/letsencrypt/live/qa.highbasemarket.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qa.highbasemarket.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS (safe now)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/html/public;
    index index.html index.htm index.php;

    charset utf-8;

    # Static assets with long cache TTL
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;

        # Try to serve static files directly, fallback to Octane
        try_files $uri $uri/ @octane;
    }

    # Security: Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security: Deny access to sensitive files
    location ~* (\.env|composer\.json|composer\.lock|package\.json|webpack\.mix\.js)$ {
        deny all;
    }

    # Security: Protect common directories
    location ~* /(storage|bootstrap|config|database|resources|routes|tests|node_modules) {
        deny all;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://frankenphp_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Custom health check logic
        proxy_intercept_errors on;
        error_page 500 502 503 504 =200 /health_fallback;
    }

    location = /health_fallback {
        return 200 "degraded\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # API endpoint with stricter rate limiting
    location ~ ^/api/ {
        limit_req zone=api burst=20 nodelay;

        # API-specific headers
        add_header X-API-Version "1.0" always;

        try_files $uri $uri/ @octane;
    }

    # Main application routing
    location /index.php {
        try_files /not_exists @octane;
    }

    location / {
        try_files $uri $uri/ @octane;
    }

    # Enhanced Octane proxy location
    location @octane {
        set $suffix "";

        if ($uri = /index.php) {
            set $suffix ?$query_string;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Enhanced proxy settings
        proxy_redirect off;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 64 16k;
        proxy_busy_buffers_size 24k;
        proxy_max_temp_file_size 1024m;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # File upload support
        client_max_body_size 100m;
        client_body_buffer_size 128k;
        client_body_timeout 90s;

        # WebSocket support for Octane
        proxy_set_header X-Original-URI $request_uri;

        proxy_pass http://frankenphp_backend$suffix;
    }

    # Enhanced WebSocket/app proxy for real-time features
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Original-URI $request_uri;

        # WebSocket specific timeouts
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 3600s;

        # Buffer settings for WebSocket
        proxy_buffering off;

        proxy_pass http://websocket_backend;
    }

    location /ts {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        rewrite ^/ts/(.*)$ /$1 break;

        proxy_pass http://typesense_server;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Cache static error pages
    location ~ ^/(404|50x)\.html$ {
        internal;
        expires 1h;
        add_header Cache-Control "public";
    }
}
