services:
  highbase-app:
    build:
      context: './docker/QA'
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: 'sail-8.4/app'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
      - typesense

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/QA-nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/QA-nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - './docker/QA-nginx/certbot:/var/www/certbot'
      - './docker/certbot/conf:/etc/letsencrypt'
      - './docker/certbot/www:/var/www/certbot'
      - '.:/var/www/html'
    depends_on:
      - typesense
      - highbase-app
    networks:
      - sail

  certbot:
    image: certbot/certbot
    volumes:
      - './docker/certbot/conf:/etc/letsencrypt'
      - './docker/certbot/www:/var/www/certbot'
    entrypoint: >
      sh -c "
      certbot certonly --webroot
      --webroot-path=/var/www/certbot
      --email it@highbaseco.com
      --agree-tos
      --no-eff-email
      -d qa.highbasemarket.com
      || true
      "

  typesense:
    image: typesense/typesense:29.0
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data
    command: '--data-dir /data --api-key=xyz --enable-cors'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8108/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sail

  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    command: --skip-networking=false --disable-socket
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
      - '/tmp/mysql-docker.sock:/tmp/mysql-docker.sock'
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 3
      timeout: 5s

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s
networks:
  sail:
    driver: bridge
volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
