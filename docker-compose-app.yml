services:
    highbase-app:
        build:
            context: './docker/app'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.4/app'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        ports:
          - '8000:8000'
    nginx:
        image: nginx:alpine
        ports:
          - '80:80'
        volumes:
          - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
          - '.:/var/www/html'
        depends_on:
          - highbase-app
        networks:
          - sail
networks:
    sail:
        driver: bridge
